name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile active-window helper
        run: swiftc -O -o src/main/helpers/active-window src/main/helpers/active-window.swift -framework Cocoa

      - name: Build and publish
        run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark beta as pre-release
        if: contains(github.ref_name, 'beta')
        run: gh release edit "${{ github.ref_name }}" --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
